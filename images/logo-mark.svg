<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Latva-Mantilan hunajatilan tunnus: mehiläinen ja hunajakenno">
  <!-- Outer badge ring -->
  <circle cx="50" cy="50" r="47" fill="none" stroke="#2A2013" stroke-width="2.2"/>
  <circle cx="50" cy="50" r="41.5" fill="none" stroke="#2A2013" stroke-width="1" stroke-dasharray="1.2 4.4" stroke-linecap="round"/>

  <!-- Honeycomb hexagon -->
  <path d="M50 24 L69 35.5 L69 58.5 L50 70 L31 58.5 L31 35.5 Z"
        fill="none" stroke="#2A2013" stroke-width="2.2" stroke-linejoin="round"/>
  <path d="M50 33 L61.5 39.8 L61.5 53.4 L50 60.2 L38.5 53.4 L38.5 39.8 Z"
        fill="none" stroke="#2A2013" stroke-width="1.1" stroke-linejoin="round" opacity="0.55"/>

  <!-- Bee body, resting across the comb -->
  <g>
    <ellipse cx="50" cy="47" rx="9.5" ry="6.4" fill="#C8842A" stroke="#2A2013" stroke-width="1.4"/>
    <path d="M42 45.2 h16 M42.6 48.6 h14.8 M43.6 51.6 h12.8" stroke="#2A2013" stroke-width="1.5" stroke-linecap="round"/>
    <!-- wings -->
    <path d="M45 42.5 C40 36, 33 37, 31 41.5 C35.5 43.5, 41.5 43.8, 45 42.5 Z" fill="#FFFBF1" stroke="#2A2013" stroke-width="1.1" opacity="0.9"/>
    <path d="M55 42.5 C60 36, 67 37, 69 41.5 C64.5 43.5, 58.5 43.8, 55 42.5 Z" fill="#FFFBF1" stroke="#2A2013" stroke-width="1.1" opacity="0.9"/>
    <!-- antennae -->
    <path d="M45.5 41.2 C44 37.5, 43 35.5, 41.7 33.6" fill="none" stroke="#2A2013" stroke-width="1.3" stroke-linecap="round"/>
    <path d="M54.5 41.2 C56 37.5, 57 35.5, 58.3 33.6" fill="none" stroke="#2A2013" stroke-width="1.3" stroke-linecap="round"/>
    <circle cx="41.4" cy="32.9" r="1.3" fill="#2A2013"/>
    <circle cx="58.6" cy="32.9" r="1.3" fill="#2A2013"/>
  </g>

  <!-- Honey drop accent -->
  <path d="M50 74 C52.6 78, 53.6 80.6, 53.6 82.6 C53.6 85.2, 51.6 87, 50 87 C48.4 87, 46.4 85.2, 46.4 82.6 C46.4 80.6, 47.4 78, 50 74 Z"
        fill="#C8842A" stroke="#2A2013" stroke-width="1.2"/>
</svg>
